<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link
            href="/assets/images/thedadamsLogo.png"
            rel="icon"
            type="image/x-icon"
        />
        <link href="https://techhub.social/@thedadams" rel="me" />
        {% if page.layout == "post" %}
        <meta name="fediverse:creator" content="@thedadams@techhub.social" />
        {% endif %}
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        {% seo title=false %}
        <script
            async
            data-goatcounter="https://thedadams.goatcounter.com/count"
            src="//gc.zgo.at/count.js"
        ></script>
        <title>
            Donnie Adams{% if page.title %} - {{ page.title }}{% endif %}
        </title>
        <script>
            (() => {
                const storedTheme = localStorage.getItem("theme");
                const prefersDark = window.matchMedia(
                    "(prefers-color-scheme: dark)",
                ).matches;
                const theme = storedTheme || (prefersDark ? "dark" : "light");
                document.documentElement.dataset.theme = theme;
            })();
        </script>
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
            :root {
                color-scheme: light;
                --page-bg: #f7f4ee;
                --page-text: #1f2937;
                --muted-text: #6b7280;
                --heading-text: #111827;
                --surface: rgba(255, 255, 255, 0.78);
                --surface-strong: #1f2937;
                --surface-soft: #dbeafe;
                --surface-soft-hover: #bfdbfe;
                --surface-border: rgba(148, 163, 184, 0.28);
                --link-color: #3b82f6;
                --link-hover: #2563eb;
                --accent: #fb923c;
                --accent-strong: #f97316;
                --button-text: #ffffff;
                --button-hover-text: #111827;
                --shadow-color: rgba(15, 23, 42, 0.08);
                --page-backdrop: #f7f4ee;
                --panel-surface-strong: #1e293b;
                --feature-strip-bg: #1e293b;
                --footer-surface: rgba(255, 255, 255, 0.18);
                --card-surface: rgba(255, 255, 255, 0.45);
                --page-shell-width: 72rem;
                --page-shell-padding: 2rem 1rem;
                --grid-gap: 2rem;
                --card-radius: 0.75rem;
            }

            [data-theme="dark"] {
                color-scheme: dark;
                --page-bg: #0f172a;
                --page-text: #dbe4f0;
                --muted-text: #94a3b8;
                --heading-text: #f8fafc;
                --surface: rgba(15, 23, 42, 0.72);
                --surface-strong: #172033;
                --surface-soft: rgba(37, 99, 235, 0.18);
                --surface-soft-hover: rgba(59, 130, 246, 0.3);
                --surface-border: rgba(148, 163, 184, 0.2);
                --link-color: #7dd3fc;
                --link-hover: #bae6fd;
                --accent: #fdba74;
                --accent-strong: #fb923c;
                --button-text: #0f172a;
                --button-hover-text: #0f172a;
                --shadow-color: rgba(2, 6, 23, 0.45);
                --page-backdrop: #0f172a;
                --panel-surface-strong: rgba(15, 23, 42, 0.92);
                --feature-strip-bg: #22304a;
                --footer-surface: rgba(15, 23, 42, 0.36);
                --card-surface: rgba(15, 23, 42, 0.42);
            }

            /* Font declarations */
            html {
                font-family: "Roboto", sans-serif;
                background: var(--page-backdrop);
                min-height: 100%;
            }

            @font-face {
                font-family: "Nunito";
                src: url("https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200,400..1000;1,200..1000&display=swap");
            }

            @font-face {
                font-family: "Roboto";
                src: url("https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap");
            }

            /* Base typography */
            body {
                background: transparent;
                color: var(--page-text);
                transition:
                    background-color 0.25s ease,
                    color 0.25s ease;
            }

            p {
                font-size: 1.1em;
                padding-block-end: 1em;
            }

            h1,
            h2,
            h3 {
                font-family: "Nunito", sans-serif;
            }

            h1 {
                font-size: 3.75rem !important;
                margin-bottom: 1rem !important;
                font-weight: 600 !important;
                font-family: "Nunito", sans-serif !important;
                color: var(--heading-text) !important;
            }

            h2 {
                font-size: 1.5rem !important;
                line-height: 2rem;
                margin-bottom: 1rem !important;
                font-weight: 700 !important;
                color: var(--link-color) !important;
            }

            h3 {
                font-size: 1.25rem;
                margin-bottom: 0.5rem;
                font-weight: 600;
                color: var(--heading-text);
            }

            /* Link styles */
            a {
                text-decoration: underline !important;
                color: var(--link-color) !important;
                transition: color 0.2s ease;
            }

            a:hover {
                color: var(--link-hover) !important;
            }

            .nav-link,
            .nav-link-active,
            .btn-link {
                text-decoration: none !important;
                color: inherit !important;
            }

            .nav-link:hover {
                color: var(--link-hover) !important;
            }

            .nav-link-active {
                color: var(--accent) !important;
            }

            .back-link {
                color: var(--accent) !important;
            }

            header {
                position: sticky;
                top: 0;
                z-index: 40;
                backdrop-filter: blur(14px);
                background: var(--surface);
                border-bottom: 1px solid var(--surface-border);
                box-shadow: 0 12px 40px -24px var(--shadow-color);
            }

            footer {
                border-top: 1px solid var(--surface-border);
                background: var(--footer-surface);
            }

            /* Theme toggle */
            .theme-toggle {
                display: inline-flex;
                align-items: center;
                gap: 0.65rem;
                padding: 0.55rem 0.95rem;
                border-radius: 9999px;
                border: 1px solid var(--surface-border);
                background: rgba(255, 255, 255, 0.38);
                color: var(--page-text);
                text-decoration: none !important;
                box-shadow: 0 12px 30px -24px var(--shadow-color);
                transition:
                    transform 0.2s ease,
                    background-color 0.2s ease,
                    border-color 0.2s ease;
            }

            [data-theme="dark"] .theme-toggle {
                background: rgba(15, 23, 42, 0.55);
            }

            .theme-toggle:hover {
                transform: translateY(-1px);
                color: var(--accent) !important;
                border-color: rgba(251, 146, 60, 0.4);
            }

            .theme-toggle-icon {
                width: 1.1rem;
                height: 1.1rem;
            }

            .theme-toggle-sun,
            [data-theme="dark"] .theme-toggle-moon {
                display: none;
            }

            [data-theme="dark"] .theme-toggle-sun,
            .theme-toggle-moon {
                display: block;
            }

            /* Tailwind utility overrides */
            .text-gray-600,
            .text-gray-400 {
                color: var(--muted-text) !important;
            }

            .text-blue-400,
            .text-blue-800 {
                color: var(--link-color) !important;
            }

            .bg-blue-100 {
                background-color: var(--surface-soft) !important;
            }

            .hover\:bg-blue-200:hover {
                background-color: var(--surface-soft-hover) !important;
            }

            .bg-gray-800 {
                background: var(--panel-surface-strong) !important;
            }

            .bg-white {
                background-color: rgba(255, 255, 255, 0.94) !important;
            }

            [data-theme="dark"] .bg-white {
                background-color: rgba(15, 23, 42, 0.96) !important;
            }

            .text-white {
                color: #f8fafc !important;
            }

            .bg-orange-400 {
                background-color: var(--accent-strong) !important;
            }

            .divide-orange-400 > :not([hidden]) ~ :not([hidden]) {
                border-color: rgba(251, 146, 60, 0.45) !important;
            }

            .btn-link.bg-orange-400 {
                color: var(--button-text) !important;
            }

            .btn-link.bg-orange-400:hover {
                color: var(--button-hover-text) !important;
            }

            .shadow-lg {
                box-shadow: 0 24px 50px -30px var(--shadow-color) !important;
            }

            /* Rich text */
            :is(.prose, .prose-lg) {
                color: var(--page-text);
            }

            :is(.prose, .prose-lg) blockquote {
                border-left: 3px solid var(--accent);
                color: var(--muted-text);
            }

            :is(.prose, .prose-lg) code {
                color: var(--page-text);
                background: rgba(148, 163, 184, 0.16);
                padding: 0.1rem 0.35rem;
                border-radius: 0.35rem;
            }

            :is(.prose, .prose-lg) pre {
                background: rgba(15, 23, 42, 0.92);
                color: #e2e8f0;
                border: 1px solid rgba(148, 163, 184, 0.2);
                overflow-x: auto;
                white-space: pre;
                padding: 0.5em;
                margin-block-end: 1em;
            }

            table {
                border-color: var(--surface-border);
            }

            /* Shared layout primitives */
            .page-shell {
                max-width: var(--page-shell-width);
                margin: 0 auto;
                padding: var(--page-shell-padding);
            }

            :is(
                .watchface-list,
                .home-feature-grid,
                .philosophy-grid,
                .links-page > ul,
                .blog-post-list,
                .blog-main > ul:first-of-type,
                .blog-sidebar,
                .blog-page > ul:last-of-type
            ) {
                list-style: none;
                padding: 0;
                margin: 0;
            }

            .two-column-grid,
            .project-grid {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: var(--grid-gap);
                margin-block: 2rem;
            }

            .two-column-grid {
                align-items: center;
            }

            /* Page layouts */
            .blog-page {
                max-width: var(--page-shell-width);
                margin: 0 auto;
                padding: var(--page-shell-padding);
                display: grid;
                grid-template-columns: minmax(0, 4fr) minmax(15rem, 1fr);
                gap: 4rem;
                align-items: start;
            }

            .blog-main {
                grid-column: 1;
                min-width: 0;
            }

            .blog-page > .blog-sidebar {
                grid-column: 2;
                grid-row: 1;
            }

            .blog-page,
            .blog-main,
            .blog-sidebar,
            .blog-post-list > li,
            .blog-main > ul:first-of-type > li,
            .post-excerpt {
                min-width: 0;
                overflow-wrap: anywhere;
            }

            .home-feature-grid,
            .philosophy-grid {
                display: grid;
                grid-template-columns: repeat(3, minmax(0, 1fr));
                gap: var(--grid-gap);
                background: var(--feature-strip-bg);
                color: #f8fafc;
            }

            .watchface-list > li,
            .home-feature-grid > li,
            .philosophy-grid > li,
            .project-grid > li,
            .two-column-grid > li {
                margin: 0;
            }

            .two-column-grid img,
            .project-grid img {
                width: 100%;
                border-radius: 0.5rem;
            }

            .home-page > :not(.home-feature-grid),
            .basketball-page > :not(.philosophy-grid) {
                max-width: var(--page-shell-width);
                margin-left: auto;
                margin-right: auto;
                padding-left: 1rem;
                padding-right: 1rem;
            }

            .full-bleed-section {
                width: auto;
                margin-left: calc(50% - 50vw);
                margin-right: calc(50% - 50vw);
                padding: 3rem max(1rem, calc(50vw - 36rem)) !important;
            }

            .home-feature-grid h2,
            .philosophy-grid h2,
            .philosophy-grid h3 {
                color: inherit;
            }

            .philosophy-grid {
                gap: 3rem;
            }

            .links-page > ul {
                display: grid;
                grid-template-columns: repeat(4, minmax(0, 1fr));
                gap: 1rem;
            }

            /* Page-specific content */
            .links-page > ul > li {
                border: 1px solid rgba(148, 163, 184, 0.32);
                border-radius: var(--card-radius);
                padding: 1rem;
                background: var(--card-surface);
                transition:
                    box-shadow 0.2s ease,
                    transform 0.2s ease;
            }

            .links-page > ul > li:hover {
                transform: translateY(-2px);
                box-shadow: 0 24px 50px -30px var(--shadow-color);
            }

            .links-page > ul > li > p:first-child,
            .links-page > ul > li > p:last-child {
                margin-bottom: 0;
            }

            .links-page > ul > li > p:first-child img {
                width: 3rem;
                height: 3rem;
                object-fit: contain;
                margin-bottom: 0.75rem;
            }

            .links-page > ul > li > h3 {
                font-size: 1.125rem;
                margin-bottom: 0.5rem;
            }

            .watchface-list {
                display: grid;
                gap: var(--grid-gap);
                margin-block: 2rem;
            }

            .watchface-list > li {
                display: flex;
                align-items: center;
                gap: var(--grid-gap);
            }

            .watchface-list p:first-child {
                flex-shrink: 0;
                margin-bottom: 0;
            }

            .watchface-list p:first-child img {
                width: min(24rem, 100%);
                margin: 0 auto;
            }

            .watchface-list p:last-child {
                flex: 1;
                margin-bottom: 0;
            }

            .watchface-list strong {
                font-size: 1.25rem;
            }

            .tag-cloud {
                display: flex;
                flex-wrap: wrap;
                gap: 0.5rem;
            }

            .tag-cloud a {
                display: inline-flex;
                align-items: center;
                padding: 0.25rem 0.75rem;
                border-radius: 9999px;
                background-color: var(--surface-soft);
                color: var(--link-color) !important;
                text-decoration: none !important;
                text-transform: capitalize;
            }

            .tag-cloud a:hover {
                background-color: var(--surface-soft-hover);
            }

            .post-archive {
                margin-top: 1rem;
                padding-left: 1rem;
            }

            .post-archive li {
                margin-bottom: 0.5rem;
            }

            .post-archive em {
                font-style: normal;
                font-size: 0.875rem;
                color: var(--muted-text);
            }

            .blog-post-list > li,
            .blog-main > ul:first-of-type > li {
                margin: 0;
                padding: 1.5rem 0;
                border-bottom: 1px solid rgba(251, 146, 60, 0.45);
            }

            .blog-post-list > li:first-child,
            .blog-main > ul:first-of-type > li:first-child {
                padding-top: 0;
            }

            .blog-post-list > li:last-child,
            .blog-main > ul:first-of-type > li:last-child {
                border-bottom: 0;
                padding-bottom: 0;
            }

            .blog-post-list > li > p:last-child,
            .blog-sidebar > li > p:last-child {
                margin-bottom: 0;
            }

            .blog-main > ul:first-of-type > li > p:last-child,
            .blog-page > ul:last-of-type > li > p:last-child {
                margin-bottom: 0;
            }

            .post-meta,
            .sidebar-feed {
                font-size: 0.75rem !important;
                color: var(--muted-text) !important;
            }

            .blog-post-list .post-excerpt {
                max-width: none;
            }

            .blog-sidebar > li,
            .blog-page > ul:last-of-type > li {
                margin: 0 0 1.5rem;
                padding: 0;
                border-bottom: 0 !important;
            }

            .blog-sidebar > li:last-child,
            .blog-page > ul:last-of-type > li:last-child {
                margin-bottom: 0;
            }

            .uses-page .updated-note {
                display: block;
                font-style: italic;
                color: var(--muted-text);
                font-size: 0.875rem;
                margin-top: 0.35rem;
            }

            .uses-list {
                list-style: disc;
                padding-left: 1.5rem;
                margin-left: 1.5rem;
            }

            .uses-list li {
                padding-block: 0.375rem;
            }

            /* Responsive adjustments */
            @media (max-width: 767px) {
                h1 {
                    font-size: 2.5rem !important;
                    line-height: 1.05;
                }

                p {
                    font-size: 1rem;
                }

                .theme-toggle {
                    padding-inline: 0.75rem;
                }

                .two-column-grid,
                .project-grid,
                .links-page > ul,
                .home-feature-grid,
                .philosophy-grid,
                .blog-page {
                    grid-template-columns: 1fr;
                }

                .watchface-list > li {
                    flex-direction: column;
                    align-items: stretch;
                }

                .blog-page {
                    gap: 2rem;
                    padding: 1.5rem 1rem 2rem;
                }

                .blog-page > .blog-sidebar {
                    grid-column: 1;
                    grid-row: auto;
                    border-top: 1px solid rgba(251, 146, 60, 0.3);
                    padding-top: 1.5rem !important;
                }

                .blog-post-list > li,
                .blog-main > ul:first-of-type > li {
                    padding: 1.25rem 0;
                }

                .blog-main > h1:first-child {
                    margin-bottom: 0.75rem !important;
                }

                .full-bleed-section {
                    padding-inline: 1rem;
                }
            }
        </style>
    </head>
    <body>
        <div class="flex flex-col min-h-screen">
            <header>{% include navbar.html %}</header>

            <main class="flex-grow">
                <article class="{{ page.content_class }}">
                    {{ content }}
                </article>
            </main>

            <footer>{% include footer.html %}</footer>
        </div>
    </body>
</html>
