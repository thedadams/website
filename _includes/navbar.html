{% assign current_url = page.url | replace: '/index.html', '/' | replace: '.html', '' %}

<nav class="h-16 flex justify-between items-center px-6 md:px-8">
    <div class="flex items-center">
        <a href="/">
            <img
                alt="Logo"
                class="max-h-12"
                loading="lazy"
                src="/assets/images/thedadamsLogo.png"
            />
        </a>
    </div>

    <!-- Desktop Navigation -->
    <div class="hidden md:flex items-center space-x-8 text-xl">
        <a
            href="/"
            class="{% if current_url == '/' or current_url == '/index' %}nav-link-active{% else %}nav-link{% endif %}"
            >Home</a
        >
        <a
            href="/about"
            class="{% if current_url == '/about' or current_url == '/about/' %}nav-link-active{% else %}nav-link{% endif %}"
            >About</a
        >
        <a
            href="/projects"
            class="{% if current_url == '/projects' or current_url == '/projects/' %}nav-link-active{% else %}nav-link{% endif %}"
            >Projects</a
        >
        <a
            href="/basketball"
            class="{% if current_url == '/basketball' or current_url == '/basketball/' %}nav-link-active{% else %}nav-link{% endif %}"
            >Basketball</a
        >
        <a
            href="/blog"
            class="{% if current_url == '/blog' or current_url == '/blog/' or page.layout == 'post' %}nav-link-active{% else %}nav-link{% endif %}"
            >Blog</a
        >
        <a
            href="/uses"
            class="{% if current_url == '/uses' or current_url == '/uses/' %}nav-link-active{% else %}nav-link{% endif %}"
            >Uses</a
        >
        <a
            href="/links"
            class="{% if current_url == '/links' or current_url == '/links/' %}nav-link-active{% else %}nav-link{% endif %} font-weight-bold"
            >Links</a
        >
        <button
            type="button"
            class="theme-toggle"
            data-theme-toggle
            aria-label="Switch color theme"
            aria-pressed="false"
        >
            <svg
                class="theme-toggle-icon theme-toggle-moon"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true"
            >
                <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"
                ></path>
            </svg>
            <svg
                class="theme-toggle-icon theme-toggle-sun"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true"
            >
                <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M12 3v2.25M12 18.75V21M4.5 4.5l1.59 1.59M17.91 17.91l1.59 1.59M3 12h2.25M18.75 12H21M4.5 19.5l1.59-1.59M17.91 6.09l1.59-1.59M15.75 12A3.75 3.75 0 1112 8.25 3.75 3.75 0 0115.75 12z"
                ></path>
            </svg>
        </button>
    </div>

    <div class="md:hidden flex items-center gap-3">
        <button
            type="button"
            class="theme-toggle"
            data-theme-toggle
            aria-label="Switch color theme"
            aria-pressed="false"
        >
            <svg
                class="theme-toggle-icon theme-toggle-moon"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true"
            >
                <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"
                ></path>
            </svg>
            <svg
                class="theme-toggle-icon theme-toggle-sun"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true"
            >
                <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M12 3v2.25M12 18.75V21M4.5 4.5l1.59 1.59M17.91 17.91l1.59 1.59M3 12h2.25M18.75 12H21M4.5 19.5l1.59-1.59M17.91 6.09l1.59-1.59M15.75 12A3.75 3.75 0 1112 8.25 3.75 3.75 0 0115.75 12z"
                ></path>
            </svg>
        </button>

        <!-- Mobile Menu Button -->
        <button
            id="mobile-menu-button"
            class="flex items-center text-2xl focus:outline-none"
            aria-label="Toggle menu"
            aria-expanded="false"
        >
            <svg
                id="hamburger-icon"
                class="w-8 h-8 transition-transform duration-300"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg"
            >
                <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M4 6h16M4 12h16M4 18h16"
                ></path>
            </svg>
            <svg
                id="close-icon"
                class="w-8 h-8 hidden transition-transform duration-300"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg"
            >
                <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M6 18L18 6M6 6l12 12"
                ></path>
            </svg>
        </button>
    </div>
</nav>

<!-- Mobile Navigation Menu -->
<div
    id="mobile-menu"
    class="md:hidden bg-white shadow-lg overflow-hidden transition-all duration-300 ease-in-out"
    style="max-height: 0; opacity: 0"
>
    <div class="flex flex-col space-y-4 px-8 py-6 text-xl">
        <a
            href="/"
            class="{% if current_url == '/' or current_url == '/index' %}nav-link-active{% else %}nav-link{% endif %} transition-colors duration-200"
            >Home</a
        >
        <a
            href="/about"
            class="{% if current_url == '/about' or current_url == '/about/' %}nav-link-active{% else %}nav-link{% endif %} transition-colors duration-200"
            >About</a
        >
        <a
            href="/projects"
            class="{% if current_url == '/projects' or current_url == '/projects/' %}nav-link-active{% else %}nav-link{% endif %} transition-colors duration-200"
            >Projects</a
        >
        <a
            href="/basketball"
            class="{% if current_url == '/basketball' or current_url == '/basketball/' %}nav-link-active{% else %}nav-link{% endif %} transition-colors duration-200"
            >Basketball</a
        >
        <a
            href="/blog"
            class="{% if current_url == '/blog' or current_url == '/blog/' or page.layout == 'post' %}nav-link-active{% else %}nav-link{% endif %} transition-colors duration-200"
            >Blog</a
        >
        <a
            href="/uses"
            class="{% if current_url == '/uses' or current_url == '/uses/' %}nav-link-active{% else %}nav-link{% endif %} transition-colors duration-200"
            >Uses</a
        >
        <a
            href="/links"
            class="{% if current_url == '/links' or current_url == '/links/' %}nav-link-active{% else %}nav-link{% endif %} font-weight-bold transition-colors duration-200"
            >Links</a
        >
    </div>
</div>

<script>
    const mobileMenuButton = document.getElementById("mobile-menu-button");
    const mobileMenu = document.getElementById("mobile-menu");
    const hamburgerIcon = document.getElementById("hamburger-icon");
    const closeIcon = document.getElementById("close-icon");
    const themeToggleButtons = document.querySelectorAll("[data-theme-toggle]");

    const syncThemeButtons = () => {
        const isDark = document.documentElement.dataset.theme === "dark";

        themeToggleButtons.forEach((button) => {
            button.setAttribute("aria-pressed", String(isDark));
            button.setAttribute(
                "aria-label",
                isDark ? "Switch to light theme" : "Switch to dark theme",
            );
        });
    };

    themeToggleButtons.forEach((button) => {
        button.addEventListener("click", () => {
            const nextTheme =
                document.documentElement.dataset.theme === "dark"
                    ? "light"
                    : "dark";

            document.documentElement.dataset.theme = nextTheme;
            localStorage.setItem("theme", nextTheme);
            syncThemeButtons();
        });
    });

    syncThemeButtons();

    mobileMenuButton.addEventListener("click", () => {
        const isExpanded =
            mobileMenuButton.getAttribute("aria-expanded") === "true";

        if (isExpanded) {
            // Close menu
            mobileMenu.style.maxHeight = "0";
            mobileMenu.style.opacity = "0";
        } else {
            // Open menu
            mobileMenu.style.maxHeight = "500px";
            mobileMenu.style.opacity = "1";
        }

        hamburgerIcon.classList.toggle("hidden");
        closeIcon.classList.toggle("hidden");

        mobileMenuButton.setAttribute("aria-expanded", !isExpanded);
    });

    // Close mobile menu when a link is clicked
    const mobileLinks = mobileMenu.querySelectorAll("a");
    mobileLinks.forEach((link) => {
        link.addEventListener("click", () => {
            mobileMenu.style.maxHeight = "0";
            mobileMenu.style.opacity = "0";
            hamburgerIcon.classList.remove("hidden");
            closeIcon.classList.add("hidden");
            mobileMenuButton.setAttribute("aria-expanded", "false");
        });
    });
</script>
