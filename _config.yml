# Jekyll configuration for thedadams.com
title: Donnie Adams
author: Donnie Adams
email: donnie@thedadams.com
description: >-
  Software engineer, mathematician, and basketball coach.
  Personal website and blog.
baseurl: ""
url: "https://thedadams.com"
plugins:
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag

logo: /assets/images/thedadamsLogo.png
image: /assets/images/social-card.svg
social:
  name: Donnie Adams
  links:
    - https://github.com/thedadams
    - https://www.linkedin.com/in/thedadams
    - https://x.com/thedadams
    - https://bsky.app/profile/thedadams.com

# Build settings
markdown: kramdown
theme: null
plugins_dir: []

# Exclude from processing
exclude:
  - vendor
  - Gemfile
  - Gemfile.lock
  - .github

# Include files
include:
  - _data

# Collections
collections:
  posts:
    output: true
    permalink: /blog/:year/:month/:day/:title

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      image: /assets/images/social-card.svg
  - scope:
      path: ""
    values:
      layout: "default"
      image: /assets/images/social-card.svg
